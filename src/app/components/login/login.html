<div class="login-wrapper">
  <div class="login-background"></div>
  
  <div class="login-container">
    <div class="login-header">
      <img src="/assets/alumno.jpg" alt="Alumno" class="alumno-image">
      <h2>Portal Académico</h2>
    </div>

    <form class="login-form">
      <div class="form-group">
        <label for="codigo">Código Estudiantil</label>
        <input type="text" id="codigo" placeholder="Ingresa tu código">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña">
      </div>

      <div class="form-options">
        <label class="remember-toggle">
          <input type="checkbox">
          <span class="toggle-slider"></span>
          <span class="toggle-text">Recordar mi código</span>
        </label>
      </div>

      <button type="submit" class="login-button">Iniciar Sesión</button>
    </form>
  </div>
</div>
